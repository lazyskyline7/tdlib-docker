name: Build and Push Multi-Arch Image

on:
  push:
    tags:
      - '*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Multi-Arch Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            lazyskyline/tdlib:${{ github.ref_name }}
            lazyskyline/tdlib:latest
          # Registry-backed build cache (speeds CI across runs and builders) - GHCR
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/tdlib-buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/tdlib-buildcache,mode=max

  create-release:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute commit summary
        id: get_changes
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Current tag: $TAG"
          git fetch --tags
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG"^ 2>/dev/null || git tag --sort=-creatordate | grep -v "^$TAG$" | head -n1 || true)
          if [ -n "$PREV_TAG" ]; then RANGE="$PREV_TAG..$TAG"; else RANGE="$TAG"; fi
          BODY=$(git log "$RANGE" --pretty=format:'- %s (%h) — %an')
          if [ -z "$BODY" ]; then BODY="No changes recorded."; fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "${{ steps.get_changes.outputs.body }}" \
          || gh release edit "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "${{ steps.get_changes.outputs.body }}"

  update-dockerhub-description:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: lazyskyline/tdlib
          readme-filepath: ./README.md
